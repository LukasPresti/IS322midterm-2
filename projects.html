<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Projects Gallery | Lukas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="gallery-body">
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="left: 60%; background: var(--accent-primary);"></div>
    </div>

    <nav class="navbar solid-nav">
        <a href="index.html" class="back-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Back to Portfolio
        </a>
        <div class="logo">Project Gallery<span class="highlight">.</span></div>
    </nav>

    <main class="gallery-main fade-in visible">
        <div class="gallery-header">
            <h1>Generated AI Websites</h1>
            <p class="subtitle">Browse, view, and update your autonomously generated projects below.</p>
            <div class="header-actions">
                <a href="builder.html" class="btn primary-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Build New Project
                </a>
            </div>
        </div>

        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Fetching projects from GitHub...</p>
        </div>

        <div id="error-message" class="error-banner" style="display: none;"></div>

        <div id="gallery-grid" class="gallery-grid" style="display: none;">
            <!-- Gallery Cards Will Be Injected Here by JS -->
        </div>
    </main>

    <script src="projects.js"></script>
</body>

</html>
